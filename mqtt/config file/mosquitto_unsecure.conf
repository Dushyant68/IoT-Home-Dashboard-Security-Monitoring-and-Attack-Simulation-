## ─── mosquitto_unsecure.conf ─────────────────────────────────
## Use this config for ATTACK DEMO PHASE ONLY
## Authentication is OFF — anyone can connect without credentials
## This simulates a real-world misconfigured IoT deployment
## Copy contents into mosquitto.conf and restart broker
## Command: docker restart mosquitto-broker
## After demo — switch BACK to mosquitto_secure.conf immediately
## ─────────────────────────────────────────────────────────────

listener 1883
allow_anonymous true
password_file /mosquitto/config/passwords
persistence true
persistence_location /mosquitto/data/
log_dest file /mosquitto/log/mosquitto.log
log_type all
sys_interval 10
max_connections 20
