## ─── mosquitto_secure.conf ───────────────────────────────────
## Use this config for NORMAL OPERATION
## Authentication is ON — anonymous connections are blocked
## Copy contents into mosquitto.conf and restart broker
## Command: docker restart mosquitto-broker
## ─────────────────────────────────────────────────────────────

listener 1883
allow_anonymous false
password_file /mosquitto/config/passwords
acl_file /mosquitto/config/acl
persistence true
persistence_location /mosquitto/data/
log_dest file /mosquitto/log/mosquitto.log
log_type all
sys_interval 10
max_connections 20
